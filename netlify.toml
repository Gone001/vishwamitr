[build]
  command = "pnpm install --no-frozen-lockfile && pnpm build"
  publish = ".next/static"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NPM_FLAGS = "--prefix"
  PNPM_VERSION = "10.30.3"

[[redirects]]
  from = "/api/*"
  to = "https://vishwamitr-api.onrender.com/:splat"
  status = 200
  force = true
